<svg xmlns="http://www.w3.org/2000/svg" width="900" height="804" viewBox="0 0 900 804"><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient></defs><rect width="900" height="804" rx="28" fill="url(#bg)"/><rect x="20" y="20" width="860" height="764" rx="22" fill="#111827" fill-opacity="0.72"/><text x="36" y="54" font-size="26" font-weight="700" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#e6edf3"><tspan x="36" dy="0">【泰拉刃】</tspan></text><text x="36" y="98" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#e6edf3"><tspan x="36" dy="0">泰拉刃是一把困难模式、世纪之花后的剑，会在挥舞时发射宽大的绿色斩波射弹。它在挥舞时还会在剑刃</tspan><tspan x="36" dy="24">周围产生一圈大范围的能量光环，显著提高了它对敌怪造成伤害的范围，并且能覆盖到玩家身后。不过，</tspan><tspan x="36" dy="24">和可击中所有在近战范围内的敌怪的大部分阔剑不同，泰拉刃的近战挥舞最多只能击中三个目标。泰拉刃</tspan><tspan x="36" dy="24">的射弹最初造成 100% 武器的伤害，能够穿透无限数量的目标，每穿透一个目标后受到 25% </tspan><tspan x="36" dy="24">的伤害惩罚。 [1] 射弹会在 1.5 秒后、 [2] 击中实心块时、或其伤害在穿透后降低至</tspan><tspan x="36" dy="24"> 0 时消失。 [3] 泰拉刃的剑刃、光环、或射弹击中敌怪时会产生独特的绿色闪光。</tspan></text><text x="36" y="252" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#cbd5e1"><tspan x="36" dy="0">类型：武器 / 制作材料</tspan></text><text x="36" y="280" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#cbd5e1"><tspan x="36" dy="0">伤害：85</tspan></text><text x="36" y="308" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#cbd5e1"><tspan x="36" dy="0">击退：6.5</tspan></text><rect x="36" y="346" width="828" height="218" rx="18" fill="#0f172a" fill-opacity="0.58"/><text x="56" y="374" font-size="18" font-weight="700" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#93c5fd">配方</text><image href="data:image/png;base64," x="56" y="374" width="28" height="28" preserveAspectRatio="xMidYMid meet"/><text x="94" y="396" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#e6edf3"><tspan x="94" dy="0">材料：断裂英雄剑 x1</tspan></text><image href="data:image/png;base64," x="56" y="412" width="28" height="28" preserveAspectRatio="xMidYMid meet"/><text x="94" y="434" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#e6edf3"><tspan x="94" dy="0">材料：真断钢剑 x1</tspan></text><image href="data:image/png;base64," x="56" y="450" width="28" height="28" preserveAspectRatio="xMidYMid meet"/><text x="94" y="472" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#e6edf3"><tspan x="94" dy="0">材料：真永夜刃 x1</tspan></text><image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAASBAMAAAC+3HPqAAAAHlBMVEUAAADU/76d0pBirYAWd30KVGoLQGINOxwFNkgHGitDmNY5AAAAAXRSTlMAQObYZgAAAFJJREFUeNp1zUENwDAMQ1FTKAVTCIVQKIVQMIVSKNtJzXaY0vzbO1iGfgHF5HgjqWLI3U7uEqohyUhTqjo3AaDxkoZFqPHyfLNoPP0099376+YHgnZAa8S5YzIAAAAASUVORK5CYII=" x="56" y="488" width="28" height="28" preserveAspectRatio="xMidYMid meet"/><text x="94" y="510" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#e6edf3"><tspan x="94" dy="0">制作站：秘银砧或山铜砧</tspan></text><rect x="36" y="576" width="828" height="114" rx="18" fill="#0f172a" fill-opacity="0.58"/><text x="56" y="604" font-size="18" font-weight="700" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#93c5fd">用于</text><image href="data:image/png;base64," x="56" y="604" width="28" height="28" preserveAspectRatio="xMidYMid meet"/><text x="94" y="626" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#e6edf3"><tspan x="94" dy="0">天顶剑 x1</tspan></text><text x="94" y="654" font-size="15" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#93c5fd"><tspan x="94" dy="0">制作站：秘银砧或山铜砧</tspan></text><text x="36" y="708" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#93c5fd"><tspan x="36" dy="0">原链接：https://terraria.wiki.gg/zh/wiki/%E6%B3%B0</tspan><tspan x="36" dy="22">%E6%8B%89%E5%88%83</tspan></text><text x="36" y="758" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#e6edf3"><tspan x="36" dy="0">Terraria Wiki</tspan></text></svg>