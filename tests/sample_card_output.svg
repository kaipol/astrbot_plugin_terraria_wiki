<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540"><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient></defs><rect width="900" height="540" rx="28" fill="url(#bg)"/><rect x="20" y="20" width="860" height="500" rx="22" fill="#111827" fill-opacity="0.72"/><text x="36" y="54" font-size="26" font-weight="700" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#e6edf3"><tspan x="36" dy="0">【星怒】</tspan></text><text x="36" y="98" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#e6edf3"><tspan x="36" dy="0">星怒是一把困难模式之前的剑，有 1/4 (25%) 几率在漂浮岛上的天域箱中找到，有 1/4</tspan><tspan x="36" dy="24"> (25%) 几率从天空匣(电脑版、主机版、和移动版)和天蓝匣(电脑版、主机版、和移动版)中</tspan><tspan x="36" dy="24">获得。在挥舞时，星怒有时能生成从天而降的星星射弹落向光标位置。星星会发光，造成 1.5 倍于</tspan><tspan x="36" dy="24">剑的伤害（37 基础伤害），不造成击退，且能够穿透一次。 [1] 星星在到达光标处或光标上方</tspan><tspan x="36" dy="24">最低的开阔空间之前可以穿透所有物块，此后它会在击中物块时消失。</tspan></text><text x="36" y="228" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#cbd5e1"><tspan x="36" dy="0">类型：武器 / 制作材料</tspan></text><text x="36" y="256" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#cbd5e1"><tspan x="36" dy="0">伤害：25</tspan></text><text x="36" y="284" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#cbd5e1"><tspan x="36" dy="0">击退：5</tspan></text><rect x="36" y="312" width="828" height="114" rx="18" fill="#0f172a" fill-opacity="0.58"/><text x="56" y="340" font-size="18" font-weight="700" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#93c5fd">用于</text><image href="data:image/png;base64," x="56" y="340" width="28" height="28" preserveAspectRatio="xMidYMid meet"/><text x="94" y="362" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#e6edf3"><tspan x="94" dy="0">天顶剑 x1</tspan></text><text x="94" y="390" font-size="15" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#93c5fd"><tspan x="94" dy="0">制作站：秘银砧或山铜砧</tspan></text><text x="36" y="444" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#93c5fd"><tspan x="36" dy="0">原链接：https://terraria.wiki.gg/zh/wiki/%E6%98%9F</tspan><tspan x="36" dy="22">%E6%80%92</tspan></text><text x="36" y="494" font-size="18" font-weight="400" font-family="Segoe UI, Microsoft YaHei, sans-serif" fill="#e6edf3"><tspan x="36" dy="0">Terraria Wiki</tspan></text></svg>